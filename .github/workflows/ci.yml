name: CI

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run build -w @fz99/shared

      - name: Generate Prisma client
        run: npm exec -w api -- prisma generate

      # TODO: enable `npm run lint` once the pre-existing lint debt is cleared
      # (api: ~1600 errors, web: ~100 errors as of the workspaces migration)
      - name: Typecheck (api)
        run: npm run typecheck -w api

      - name: Typecheck (web)
        run: npm run typecheck -w web

      - name: Typecheck (shared)
        run: npm run typecheck -w @fz99/shared

      - name: Test (api)
        run: npm test -w api

      - name: Build api
        run: npm run build -w api

      - name: Build web
        run: npm run build -w web
        env:
          NEXT_PUBLIC_BASE_URL: http://localhost:3000

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build api image
        run: docker build -f apps/api/Dockerfile --target production .

      - name: Build web image
        run: docker build -f apps/web/Dockerfile --target production --build-arg NEXT_PUBLIC_BASE_URL=http://localhost:3000 .
